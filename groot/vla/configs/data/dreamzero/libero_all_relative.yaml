# @package _global_

defaults:
  - dreamzero/base_48_wan_fine_aug_relative
  - _self_

max_state_dim: 64
use_global_metadata: false
relative_action: false
relative_action_per_horizon: false
relative_action_keys: []
max_chunk_size: 5
dataset_shard_sampling_rate: 0.1
mixture_dataset_cls: groot.vla.data.dataset.lerobot_sharded.ShardedLeRobotMixtureDataset.from_mixture_spec
single_dataset_cls: groot.vla.data.dataset.lerobot_sharded.ShardedLeRobotSubLangSingleActionChunkDatasetDROID

# Parent directory containing all four converted LIBERO LeRobot/GEAR subsets.
# Example:
#   libero_all_data_root=/DATA/disk2/yuhangwang/data/WorldModel/libero_mujoco3.3.2
libero_all_data_root: ???

libero_spatial_data_root: ${libero_all_data_root}/libero_spatial_no_noops_lerobot
libero_object_data_root: ${libero_all_data_root}/libero_object_no_noops_lerobot
libero_goal_data_root: ${libero_all_data_root}/libero_goal_no_noops_lerobot
libero_10_data_root: ${libero_all_data_root}/libero_10_no_noops_lerobot

train_dataset:
  _target_: ${mixture_dataset_cls}
  _convert_: object
  mixture_spec:
    - dataset_path:
        # All four subsets share the same LIBERO embodiment/modality layout.
        libero_sim:
          - ${libero_spatial_data_root}
          - ${libero_object_data_root}
          - ${libero_goal_data_root}
          - ${libero_10_data_root}
      dataset_weight: 1.0
      distribute_weights: true

  dataset_class: ${single_dataset_cls}
  all_modality_configs: ${modality_configs}
  all_transforms: ${transforms}
  metadata_versions: ${metadata_versions}
  fps: ${fps}
  dataset_kwargs:
    video_backend: decord
    use_global_metadata: ${use_global_metadata}
    max_chunk_size: ${max_chunk_size}
    relative_action: ${relative_action}
    relative_action_keys: ${relative_action_keys}
    relative_action_per_horizon: ${relative_action_per_horizon}
  mixture_kwargs:
    training: true
    balance_dataset_weights: false
    seed: 42
    shard_sampling_rate: ${dataset_shard_sampling_rate}
