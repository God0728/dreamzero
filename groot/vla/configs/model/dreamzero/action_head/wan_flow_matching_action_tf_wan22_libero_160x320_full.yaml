# @package _global_
# LIBERO Wan2.2 5B from-Wan initialization, full DiT fine-tune.
# The action/state encoder and action decoder are randomly initialized by CausalWanModel
# because pretrained_model_path remains null in the launch script; only Wan2.2 DiT,
# Wan2.2 VAE, Wan2.2 T5, and Wan2.1 CLIP image encoder are loaded.

defaults:
  - wan_flow_matching_action_tf_wan22
  - _self_

train_architecture: full
load_pretrained_det_decode_layer_path: null

# Wan2.2 default final model input: HxW=160x320.
# VAE38 latent: 10x20; DiT patch stride (1,2,2): 5x10 tokens/frame.
frame_seqlen: 50

action_head_cfg:
  config:
    target_video_height: 160
    target_video_width: 320
    skip_component_loading: false
    defer_lora_injection: false
